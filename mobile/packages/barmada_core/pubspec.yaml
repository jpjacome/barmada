name: barmada_core
description: Session plumbing for Barmada apps - server registry, auth, state.
version: 0.1.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  barmada_api:
    path: ../barmada_api
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
